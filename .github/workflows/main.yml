name: Roblox Endless Tracker
on:
  schedule:
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 * * * *' # Explicit 5-minute marks
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: pip install requests

      - name: Run Tracker Script
        run: python tracker.py

      - name: Commit and Save Data
        run: |
          git config --global user.name "Tracker-Bot"
          git config --global user.email "bot@github.com"
          git add logs.csv status.json
          git commit -m "Auto-update logs and cache" || exit 0
          git push
