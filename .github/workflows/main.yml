name: Roblox Endless Tracker
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_GITHUB_TOKEN }} # This opens the "Vault"

      - name: Install Dependencies
        run: pip install requests

      - name: Run Tracker Script
        run: python tracker.py

      - name: Commit and Save Data
        run: |
          git config --global user.name "Tracker-Bot"
          git config --global user.email "bot@github.com"
          git add logs.csv status.json
          git commit -m "Auto-loop update" || exit 0
          # This line uses your "VIP Pass" to trigger the next run
          git push https://x-access-token:${{ secrets.MY_GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main
